      <h1>測試文章：一個族語教學遊戲要先說清楚什麼？</h1>
      <p>這是先放的測試文章，用來確認未來「遊戲製作心得」會用部落格方式呈現。</p>
      <h2>先確認課堂目標</h2>
      <p>遊戲不是只是讓畫面變熱鬧，而是要幫老師完成一個清楚的教學目標，例如複習單字、練習聽辨、或讓學生願意開口。</p>
      <h2>再決定玩法</h2>
      <p>玩法要配合老師現場可以操作的時間、設備和學生程度。越容易說明，越有機會真的被帶進課堂。</p>
