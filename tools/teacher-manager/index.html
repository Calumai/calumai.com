<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年臺北市中高級線上族語家教老師 - 管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @media print {
            .no-print, .no-print * { display: none !important; }
            .print-section {
                display: block !important;
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            .page-break { page-break-after: always; }
            table { border-collapse: collapse !important; width: 100% !important; }
            th, td { border: 1px solid black !important; padding: 4px !important; }
            img { max-width: 500px !important; height: auto !important; }
        }

        .file-drop-zone { border: 2px dashed #cbd5e1; transition: all 0.3s ease; }
        .file-drop-zone.dragover { border-color: #3b82f6; background-color: #eff6ff; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(2px); }
        .thumbnail-container:hover .delete-btn { opacity: 1; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div id="deleteModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 modal-overlay no-print">
        <div class="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6">
            <div class="flex items-center gap-3 text-red-600 mb-4">
                <i data-lucide="alert-triangle" class="w-8 h-8"></i>
                <h3 class="text-xl font-bold">確認刪除？</h3>
            </div>
            <p id="deleteModalText" class="text-slate-600 mb-6">您確定要刪除這筆課程記錄嗎？</p>
            <div class="flex justify-end gap-3">
                <button onclick="closeDeleteModal()" class="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg">取消</button>
                <button id="confirmDeleteBtn" class="px-4 py-2 bg-red-600 text-white hover:bg-red-700 rounded-lg shadow-md">確定刪除</button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto py-8 px-4 no-print">
        <header class="text-center mb-8">
            <div class="mb-4 rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-sm font-bold text-amber-800">
                版本更新時間：2026-07-09 16:05（台北時間）｜鐘點費明細新增助教堂數與助教費用彙總
            </div>
            <div class="mb-4">
                <a href="../../" class="inline-flex items-center gap-2 text-sm text-blue-600 hover:text-blue-800">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> 回練習基地
                </a>
            </div>
            <h1 class="text-3xl font-bold text-slate-800 mb-2">115年臺北市中高級線上族語家教老師管理系統</h1>
            <div class="flex justify-center gap-6 mt-4">
                <button onclick="switchTab('screenshot')" id="tab-screenshot" class="px-4 py-2 tab-active transition-all">截圖報表管理</button>
                <button onclick="switchTab('payment')" id="tab-payment" class="px-4 py-2 text-slate-500 transition-all">鐘點費明細表</button>
            </div>
        </header>

        <div id="uploadSection" class="bg-white rounded-xl shadow-sm p-6 mb-8 border border-slate-200">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">報表月份 (如：3月份、4-5月份)</label>
                    <input type="text" id="monthTitle" value="3月份" class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">老師鐘點費單價 (每小時)</label>
                    <input type="number" id="unitPrice" value="1000" oninput="renderPaymentTable()" class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">助教費單價 (每堂)</label>
                    <input type="number" id="assistantUnitPrice" value="500" oninput="renderPaymentTable()" class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div id="dropZone" class="file-drop-zone bg-slate-50 rounded-xl p-10 text-center cursor-pointer hover:bg-slate-100 transition-colors">
                <i data-lucide="upload-cloud" class="mx-auto mb-4 text-slate-400 w-12 h-12"></i>
                <p class="text-slate-600 mb-2 font-medium">拖放圖片至此或點擊上傳 / 追加新日期照片</p>
                <p class="text-xs text-slate-400">支援格式：語別-老師-日期-編號。同老師同日期只保留第一張 (如: 南排灣語-楊寶珠-0425-1)</p>
                <input type="file" id="imageInput" multiple accept="image/*" class="hidden">
            </div>

            <div class="flex justify-center mt-6">
                <button onclick="processImages()" class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-3 rounded-lg font-bold transition flex items-center gap-2 shadow-lg">
                    <i data-lucide="play" class="w-5 h-5"></i> 分類圖片並生成報表
                </button>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 pb-20">
        <div id="screenshotView"></div>
        <div id="paymentView" class="hidden">
            <div class="bg-white p-8 rounded-xl shadow-md border border-slate-200 overflow-x-auto">
                <div class="flex justify-between items-center mb-6 no-print">
                    <h3 class="text-lg font-bold">鐘點費請領預覽</h3>
                    <button onclick="window.print()" class="bg-slate-800 text-white px-4 py-2 rounded hover:bg-black flex items-center gap-2">
                        <i data-lucide="printer" class="w-4 h-4"></i> 列印明細總表
                    </button>
                </div>
                <div id="paymentTableContainer" class="print-section"></div>
            </div>
        </div>
    </main>

    <button onclick="imageInput.click()" class="fixed right-6 bottom-6 z-50 no-print bg-blue-600 hover:bg-blue-700 text-white px-5 py-4 rounded-full font-bold shadow-2xl flex items-center gap-2">
        <i data-lucide="image-plus" class="w-5 h-5"></i>
        追加新日期照片
    </button>

    <script>
        lucide.createIcons();

        const teacherDB = {};

        const assistantMap = {
            "張月瑛": "蔡儀婷", "石佳蓉": "邱意庭", "劉立雲": "尤敏", "林成遠": "陳冠萍",
            "林秋英": "邱佳萍", "打亥": "陳冠萍", "鄭春美": "尤敏", "楊寶珠": "邱佳萍",
            "柯菊華": "邱佳萍", "彭甄琳": "林潔", "胡美芳": "尤敏"
        };

        let currentTeacherGroups = {};
        let pendingDeleteData = null;

        function switchTab(tab) {
            document.getElementById('screenshotView').classList.toggle('hidden', tab !== 'screenshot');
            document.getElementById('paymentView').classList.toggle('hidden', tab !== 'payment');
            document.getElementById('tab-screenshot').className = tab === 'screenshot' ? 'px-4 py-2 tab-active' : 'px-4 py-2 text-slate-500';
            document.getElementById('tab-payment').className = tab === 'payment' ? 'px-4 py-2 tab-active' : 'px-4 py-2 text-slate-500';
            if (tab === 'payment') renderPaymentTable();
        }

        const dropZone = document.getElementById('dropZone');
        const imageInput = document.getElementById('imageInput');
        dropZone.addEventListener('click', () => imageInput.click());
        imageInput.addEventListener('change', processImages);
        dropZone.addEventListener('dragover', event => {
            event.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', event => {
            event.preventDefault();
            dropZone.classList.remove('dragover');
            imageInput.files = event.dataTransfer.files;
            processImages();
        });

        function processImages() {
            const files = imageInput.files;
            if (files.length === 0) return;

            Array.from(files).forEach(file => {
                const cleanName = file.name.replace(/\.[^/.]+$/, "");
                const parts = cleanName.split('-');
                if (parts.length >= 3) {
                    const lang = parts[0].trim();
                    const teacherKey = parts[1].trim().replace('老師', '');
                    const date = parts[2].trim();

                    if (!currentTeacherGroups[teacherKey]) {
                        currentTeacherGroups[teacherKey] = {
                            lang,
                            displayName: teacherKey,
                            ta: assistantMap[teacherKey] || "",
                            dates: {}
                        };
                    }
                    if (!currentTeacherGroups[teacherKey].dates[date]) {
                        currentTeacherGroups[teacherKey].dates[date] = file;
                    }
                }
            });
            imageInput.value = "";
            renderAll();
        }

        function openDeleteModal(teacher, date = null) {
            pendingDeleteData = { teacher, date, type: date ? "lesson" : "teacher" };
            const text = date
                ? `您確定要刪除「${teacher}」的 ${date} 這堂課嗎？`
                : `您確定要刪除「${teacher}」整位老師與全部課程嗎？`;
            document.getElementById('deleteModalText').innerText = text;
            document.getElementById('deleteModal').classList.remove('hidden');
            document.getElementById('deleteModal').classList.add('flex');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.add('hidden');
            document.getElementById('deleteModal').classList.remove('flex');
            pendingDeleteData = null;
        }

        document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
            if (pendingDeleteData) {
                const { teacher, date, type } = pendingDeleteData;
                if (type === "teacher") {
                    delete currentTeacherGroups[teacher];
                } else {
                    delete currentTeacherGroups[teacher].dates[date];
                    if (Object.keys(currentTeacherGroups[teacher].dates).length === 0) {
                        delete currentTeacherGroups[teacher];
                    }
                }
                renderAll();
            }
            closeDeleteModal();
        });

        function printSingleTeacher(index) {
            const block = document.querySelectorAll('.teacher-block')[index];
            if (!block) return;

            const report = block.querySelector('.print-section');
            if (!report) return;

            const printWindow = window.open('', '_blank');
            if (!printWindow) {
                alert('瀏覽器封鎖了列印視窗，請允許彈出視窗後再試一次。');
                return;
            }

            printWindow.document.write(`
                <!doctype html>
                <html lang="zh-TW">
                <head>
                    <meta charset="UTF-8">
                    <title>匯出老師截圖報表</title>
                    <script src="https://cdn.tailwindcss.com"><\/script>
                    <style>
                        body { background: white; margin: 0; padding: 24px; font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; }
                        table { border-collapse: collapse; width: 100%; }
                        th, td { border: 1px solid black; padding: 4px; }
                        img { max-width: 500px; height: auto; }
                        @media print { body { padding: 0; } }
                    </style>
                </head>
                <body>
                    ${report.innerHTML}
                    <script>
                        window.addEventListener('load', () => {
                            setTimeout(() => window.print(), 300);
                        });
                    <\/script>
                </body>
                </html>
            `);
            printWindow.document.close();
        }

        function renderAll() {
            renderScreenshots();
            renderPaymentTable();
        }

        function renderScreenshots() {
            const container = document.getElementById('screenshotView');
            container.innerHTML = "";
            const monthText = document.getElementById('monthTitle').value;

            const teacherKeys = Object.keys(currentTeacherGroups).sort();
            if (teacherKeys.length === 0) {
                container.innerHTML = `
                    <div class="no-print bg-white border border-dashed border-slate-300 rounded-xl p-10 text-center text-slate-500">
                        尚未上傳圖片。請先拖放圖片或點擊上傳區。
                    </div>
                `;
                return;
            }

            const grid = document.createElement('div');
            grid.className = "grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5 no-print mb-10";

            teacherKeys.forEach((teacherKey, index) => {
                const group = currentTeacherGroups[teacherKey];
                const sortedDates = Object.keys(group.dates).sort();
                const firstDate = sortedDates[0] || "-";
                const lastDate = sortedDates[sortedDates.length - 1] || "-";
                
                const block = document.createElement('div');
                block.className = "bg-white rounded-xl shadow-md border border-slate-200 teacher-block overflow-hidden";
                
                let rows = "";
                sortedDates.forEach((date, i) => {
                    const url = URL.createObjectURL(group.dates[date]);
                    rows += `
                        <tr class="border-b border-slate-200">
                            <td class="p-4 text-center border-r w-16">${i + 1}</td>
                            <td class="p-4 text-center border-r font-bold w-32">${date}</td>
                            <td class="p-4 relative group thumbnail-container">
                                <img src="${url}" class="w-[500px] mx-auto rounded border border-slate-100">
                                <button onclick="openDeleteModal('${teacherKey.replace(/'/g, "\\'")}', '${date}')"
                                        class="no-print absolute top-6 right-6 bg-red-500 hover:bg-red-700 text-white px-3 py-2 rounded-lg opacity-0 group-hover:opacity-100 transition shadow-lg flex items-center gap-1 text-sm font-bold">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i> 刪除本堂
                                </button>
                            </td>
                        </tr>
                    `;
                });

                block.innerHTML = `
                    <div class="no-print p-5">
                        <div class="flex items-start justify-between gap-3 mb-4">
                            <div>
                                <div class="text-xs font-bold text-blue-600 mb-1">${group.lang}</div>
                                <h3 class="text-xl font-bold text-slate-800">${group.displayName}</h3>
                                <p class="text-sm text-slate-500 mt-1">共 ${sortedDates.length} 堂｜${firstDate} - ${lastDate}</p>
                            </div>
                            <div class="flex gap-2 shrink-0">
                                <button onclick="openDeleteModal('${teacherKey.replace(/'/g, "\\'")}')" class="bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-1 shadow-md">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i> 刪除老師
                                </button>
                                <button onclick="printSingleTeacher(${index})" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-1 shadow-md">
                                    <i data-lucide="printer" class="w-4 h-4"></i> PDF
                                </button>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
                            <label class="grid gap-1 text-xs font-bold text-slate-500">
                                老師姓名
                                <input type="text" value="${group.displayName}"
                                       oninput="currentTeacherGroups['${teacherKey}'].displayName = this.value; renderPaymentTable(); document.getElementById('disp-t-${index}').innerText='${group.lang}-'+this.value"
                                       class="border border-slate-300 rounded-lg px-3 py-2 text-sm font-normal text-slate-800">
                            </label>
                            <label class="grid gap-1 text-xs font-bold text-slate-500">
                                助教
                                <input type="text" value="${group.ta}"
                                       oninput="currentTeacherGroups['${teacherKey}'].ta = this.value; renderPaymentTable(); document.getElementById('disp-ta-${index}').innerText=this.value"
                                       class="border border-slate-300 rounded-lg px-3 py-2 text-sm font-normal text-slate-800">
                            </label>
                        </div>
                        <details class="rounded-lg border border-slate-200 bg-slate-50">
                            <summary class="cursor-pointer px-4 py-3 font-bold text-slate-700 flex items-center justify-between">
                                <span>展開預覽截圖</span>
                                <span class="text-sm text-slate-400">${sortedDates.length} 張</span>
                            </summary>
                            <div class="border-t border-slate-200 bg-white max-h-[70vh] overflow-auto">
                                <table class="w-full text-sm">
                                    <thead class="sticky top-0 bg-slate-100">
                                        <tr>
                                            <th class="p-2 border-b w-14">堂序</th>
                                            <th class="p-2 border-b w-24">日期</th>
                                            <th class="p-2 border-b">截圖</th>
                                        </tr>
                                    </thead>
                                    <tbody>${rows}</tbody>
                                </table>
                            </div>
                        </details>
                    </div>
                    <div class="print-section hidden p-10 bg-white">
                        <h2 class="text-2xl font-bold text-center mb-8 text-black">115年臺北市中高級線上族語家教老師 - ${monthText}截圖</h2>
                        <div class="flex justify-between mb-4 border-b-2 border-black pb-1">
                            <div class="text-lg font-bold">授課老師：<span id="disp-t-${index}">${group.lang}-${group.displayName}</span></div>
                            <div class="text-lg font-bold">助教：<span id="disp-ta-${index}">${group.ta}</span></div>
                        </div>
                        <table class="w-full border-2 border-black text-black">
                            <thead class="bg-slate-50">
                                <tr>
                                    <th class="border-2 border-black p-2 w-16">堂序</th>
                                    <th class="border-2 border-black p-2 w-32">上課日期</th>
                                    <th class="border-2 border-black p-2">授課截圖</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                `;
                grid.appendChild(block);
            });
            container.appendChild(grid);
            lucide.createIcons();
        }

        function renderPaymentTable() {
            const container = document.getElementById('paymentTableContainer');
            if (!container) return;
            const monthText = document.getElementById('monthTitle').value;
            const unitPrice = parseInt(document.getElementById('unitPrice').value) || 1000;
            const assistantUnitPrice = parseInt(document.getElementById('assistantUnitPrice').value) || 0;

            let html = `
                <h2 contenteditable="true" class="text-xl font-bold text-center mb-6 text-black outline-blue-300">115年度臺北市原住民族語中高級線上家教 ${monthText}師資鐘點費請領明細表</h2>
                <table class="w-full text-[11px] border-collapse border border-black text-black">
                    <thead class="bg-gray-100">
                        <tr>
                            <th contenteditable="true" class="border border-black p-1">序號</th>
                            <th contenteditable="true" class="border border-black p-1 w-16">授課老師</th>
                            <th contenteditable="true" class="border border-black p-1">身分證字號</th>
                            <th contenteditable="true" class="border border-black p-1 w-32">地址</th>
                            <th contenteditable="true" class="border border-black p-1">匯款銀行/帳號</th>
                            <th contenteditable="true" class="border border-black p-1">電話</th>
                            <th contenteditable="true" class="border border-black p-1">課程名稱</th>
                            <th contenteditable="true" class="border border-black p-1">開設級別</th>
                            <th contenteditable="true" class="border border-black p-1 w-32">上課日期</th>
                            <th contenteditable="true" class="border border-black p-1">堂數</th>
                            <th contenteditable="true" class="border border-black p-1 w-20">課程時間</th>
                            <th contenteditable="true" class="border border-black p-1">單價</th>
                            <th contenteditable="true" class="border border-black p-1">鐘點費</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            let teacherTotal = 0;
            const assistantTotals = {};
            Object.keys(currentTeacherGroups).sort().forEach((key, idx) => {
                const group = currentTeacherGroups[key];
                const info = teacherDB[key] || { id: "", addr: "", bank: "", tel: "", time: "", lang: group.lang };
                const dates = Object.keys(group.dates).sort();
                const totalPay = dates.length * 2 * unitPrice;
                teacherTotal += totalPay;

                const assistantName = (group.ta || "").trim();
                if (assistantName) {
                    if (!assistantTotals[assistantName]) {
                        assistantTotals[assistantName] = {
                            lessons: 0,
                            teachers: [],
                            dates: []
                        };
                    }
                    assistantTotals[assistantName].lessons += dates.length;
                    assistantTotals[assistantName].teachers.push(`${group.lang}-${group.displayName}`);
                    dates.forEach(date => assistantTotals[assistantName].dates.push(`${group.lang}-${group.displayName} ${date}`));
                }

                const dateStr = dates.map(d => {
                    if (d.length === 4 && /^\d+$/.test(d)) {
                        return `${parseInt(d.substring(0,2))}/${parseInt(d.substring(2,4))}(2H)`;
                    }
                    return `${d}(2H)`;
                }).join('<br>');

                html += `
                    <tr>
                        <td contenteditable="true" class="border border-black p-1 text-center">${idx + 1}</td>
                        <td contenteditable="true" class="border border-black p-1 text-center font-bold">${group.displayName}</td>
                        <td contenteditable="true" class="border border-black p-1 text-center">${info.id}</td>
                        <td contenteditable="true" class="border border-black p-1 text-[9px] leading-tight">${info.addr}</td>
                        <td contenteditable="true" class="border border-black p-1 text-center text-[10px]">${info.bank}</td>
                        <td contenteditable="true" class="border border-black p-1 text-center">${info.tel}</td>
                        <td contenteditable="true" class="border border-black p-1 text-center">${group.lang}</td>
                        <td contenteditable="true" class="border border-black p-1 text-center">中高級</td>
                        <td contenteditable="true" class="border border-black p-1 text-center leading-tight">${dateStr}</td>
                        <td contenteditable="true" class="border border-black p-1 text-center">${dates.length}</td>
                        <td contenteditable="true" class="border border-black p-1 text-center">${info.time}</td>
                        <td contenteditable="true" class="border border-black p-1 text-center">${unitPrice}</td>
                        <td contenteditable="true" class="border border-black p-1 text-center font-bold">${totalPay}</td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
            `;

            const assistantRows = Object.keys(assistantTotals).sort().map((assistantName, idx) => {
                const item = assistantTotals[assistantName];
                const pay = item.lessons * assistantUnitPrice;
                const teacherList = [...new Set(item.teachers)].join('<br>');
                const dateList = item.dates.join('<br>');

                return `
                    <tr>
                        <td contenteditable="true" class="border border-black p-1 text-center">${idx + 1}</td>
                        <td contenteditable="true" class="border border-black p-1 text-center font-bold">${assistantName}</td>
                        <td contenteditable="true" class="border border-black p-1 text-center leading-tight">${teacherList}</td>
                        <td contenteditable="true" class="border border-black p-1 text-center leading-tight">${dateList}</td>
                        <td contenteditable="true" class="border border-black p-1 text-center">${item.lessons}</td>
                        <td contenteditable="true" class="border border-black p-1 text-center">${assistantUnitPrice}</td>
                        <td contenteditable="true" class="border border-black p-1 text-center font-bold">${pay}</td>
                    </tr>
                `;
            }).join('');

            const assistantTotal = Object.values(assistantTotals).reduce((sum, item) => sum + item.lessons * assistantUnitPrice, 0);
            const overallTotal = teacherTotal + assistantTotal;

            html += `
                <h2 contenteditable="true" class="text-xl font-bold text-center mt-10 mb-6 text-black outline-blue-300">115年度臺北市原住民族語中高級線上家教 ${monthText}助教費用明細表</h2>
                <table class="w-full text-[11px] border-collapse border border-black text-black">
                    <thead class="bg-gray-100">
                        <tr>
                            <th contenteditable="true" class="border border-black p-1">序號</th>
                            <th contenteditable="true" class="border border-black p-1">助教</th>
                            <th contenteditable="true" class="border border-black p-1">協助課程</th>
                            <th contenteditable="true" class="border border-black p-1 w-40">上課日期</th>
                            <th contenteditable="true" class="border border-black p-1">堂數</th>
                            <th contenteditable="true" class="border border-black p-1">單價</th>
                            <th contenteditable="true" class="border border-black p-1">助教費</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${assistantRows || '<tr><td colspan="7" class="border border-black p-3 text-center text-slate-500">尚未填寫助教資料</td></tr>'}
                    </tbody>
                </table>
                <div class="mt-4 grid gap-1 text-right font-bold text-black">
                    <div contenteditable="true" class="outline-blue-300">老師鐘點費小計：NT$ ${teacherTotal}</div>
                    <div contenteditable="true" class="outline-blue-300">助教費小計：NT$ ${assistantTotal}</div>
                    <div contenteditable="true" class="text-lg outline-blue-300">總計申領金額：NT$ ${overallTotal}</div>
                </div>
            `;
            container.innerHTML = html;
        }
    </script>
</body>
</html>
