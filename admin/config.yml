backend:
  name: github
  repo: Calumai/blog-content
  branch: main
  # 使用 CalumAI 自己的 OAuth 登入服務。管理者只需按一次 GitHub 登入，
  # 後台與私人收件匣會共用同一份 GitHub 授權。
  base_url: https://sveltia-cms-auth.islanduni.workers.dev

app_title: CalumAi 網站後台

media_folder: posts
public_folder: ''

site_url: https://calumai.com
display_url: https://calumai.com/blog/

collections:
  - name: site_content
    label: 網站基本內容
    files:
      - name: content
        label: 首頁、遊戲與小工具
        file: site/content.yml
        fields:
          - name: global
            label: 全站設定
            widget: object
            fields:
              - { name: brand_name, label: 品牌名稱, widget: string }
              - { name: site_title, label: 網站標題, widget: string }
              - { name: site_description, label: 網站描述, widget: text }
              - name: nav
                label: 主選單
                widget: list
                fields:
                  - { name: label, label: 選單文字, widget: string }
                  - { name: url, label: 連結, widget: string }
          - name: homepage
            label: 首頁
            widget: object
            fields:
              - { name: kicker, label: 首頁小標, widget: string }
              - { name: title, label: 首頁大標題, widget: string }
              - { name: intro, label: 首頁介紹文字, widget: text }
              - name: stats
                label: 首頁數字狀態
                widget: list
                fields:
                  - { name: label, label: 標籤, widget: string }
                  - { name: value, label: 數字或狀態, widget: string }
              - { name: audience_title, label: 受眾區標題, widget: string }
              - name: audiences
                label: 受眾卡片
                widget: list
                fields:
                  - { name: icon, label: 圖示名稱（Lucide，例如 school）, widget: string }
                  - { name: title, label: 卡片標題, widget: string }
                  - { name: text, label: 卡片文字, widget: text }
              - { name: index_title, label: 作品總覽標題, widget: string }
              - name: index_cards
                label: 首頁入口卡片
                widget: list
                fields:
                  - { name: number, label: 編號, widget: string }
                  - { name: icon, label: 圖示名稱（Lucide）, widget: string }
                  - { name: title, label: 標題, widget: string }
                  - { name: audience, label: 對象, widget: string }
                  - { name: text, label: 說明, widget: text }
                  - { name: action, label: 按鈕文字, widget: string }
                  - { name: url, label: 連結, widget: string }
              - name: learning_request
                label: 首頁想學清單區
                widget: object
                fields:
                  - { name: kicker, label: 小標, widget: string }
                  - { name: title, label: 標題, widget: string }
                  - { name: intro, label: 說明文字, widget: text }
                  - name: prompts
                    label: 引導卡片
                    widget: list
                    fields:
                      - { name: icon, label: 圖示名稱（Lucide，例如 sparkles）, widget: string }
                      - { name: title, label: 卡片標題, widget: string }
                      - { name: text, label: 卡片文字, widget: text }
                  - { name: direct_title, label: 頁面留言標題, widget: string }
                  - { name: direct_text, label: 頁面留言說明, widget: text }
                  - { name: direct_placeholder, label: 頁面留言預設格式, widget: text }
                  - { name: direct_submit_label, label: 頁面留言送出按鈕, widget: string }
                  - { name: direct_url, label: 頁面留言送出連結, widget: string }
                  - { name: direct_issue_title, label: 公開留言單預設標題, widget: string }
                  - { name: direct_privacy_note, label: 頁面留言提醒, widget: text, required: false }
          - name: games_page
            label: 遊戲頁
            hint: 新增遊戲請在這裡的「遊戲列表」按「新增」。每一筆就是 /games/ 頁面上的一張遊戲卡片。
            widget: object
            fields:
              - { name: title, label: 頁面標題, widget: string }
              - { name: intro, label: 頁面介紹, widget: text }
              - name: games
                label: 遊戲列表（按新增就能多一個遊戲）
                widget: list
                summary: '{{title}}'
                fields:
                  - { name: kicker, label: 小標, widget: string, hint: 顯示在遊戲名稱上方，例如 CULTURE STRATEGY GAME。 }
                  - { name: title, label: 遊戲名稱, widget: string }
                  - { name: description, label: 遊戲簡介, widget: text, hint: 顯示在遊戲卡片上，1–3 句就好。 }
                  - { name: image, label: 遊戲縮圖路徑（/assets/...）, widget: string, hint: 圖片要先放到網站 assets，路徑像 /assets/my-game-thumb.png。 }
                  - { name: image_alt, label: 圖片替代文字, widget: string }
                  - name: facts
                    label: 遊戲資訊（玩家、時間、目標等）
                    widget: list
                    summary: '{{label}}：{{value}}'
                    fields:
                      - { name: label, label: 標籤, widget: string }
                      - { name: value, label: 內容, widget: string }
                  - { name: note, label: 備註, widget: text }
                  - { name: primary_label, label: 開始遊戲按鈕文字, widget: string, hint: 例如：開始旅程、開始遊戲。 }
                  - { name: primary_url, label: 開始遊戲連結, widget: string, hint: 可以填 https 網址或站內路徑。 }
                  - { name: guide_label, label: 遊戲說明按鈕文字, widget: string, required: false, hint: 例如：遊戲說明、看玩法。留空就不顯示。 }
                  - { name: guide_url, label: 遊戲說明連結, widget: string, required: false, hint: 例如 /blog/origin-rebirth-game-guide/。留空就不顯示。 }
                  - { name: secondary_label, label: 其他按鈕文字, widget: string }
                  - { name: secondary_url, label: 其他按鈕連結, widget: string }
          - name: tools_page
            label: 小工具頁
            widget: object
            fields:
              - { name: title, label: 頁面標題, widget: string }
              - { name: intro, label: 頁面介紹, widget: text }
              - name: tools
                label: 工具列表
                widget: list
                fields:
                  - { name: icon, label: 圖示名稱（Lucide）, widget: string }
                  - { name: title, label: 工具名稱, widget: string }
                  - { name: description, label: 工具說明, widget: text }
                  - { name: url, label: 工具連結, widget: string }

  - name: posts
    label: 部落格文章（製作心得）
    label_singular: 文章
    description: 寫製作心得或工作紀錄。先儲存看預覽，確認沒問題後才改成公開發布。
    folder: posts
    create: true
    format: yaml-frontmatter
    extension: md
    path: '{{slug}}/article'
    preview_path: '/admin/previews/blog/{{slug}}/'
    media_folder: ''
    public_folder: ''
    slug: '{{fields.folder_id}}'
    identifier_field: title
    summary: '{{title}}（{{fields.status}}）'
    sortable_fields: [title, status]
    fields:
      - { name: title, label: 文章標題, widget: string, hint: 會顯示在文章頁最上方。 }
      - name: folder_id
        label: 資料夾編號（建立後不要改）
        hint: 用日期加英文短名，例如 20260722-my-post。這是後台存檔用的名字，不是讀者看到的標題。
        widget: string
        pattern: ['^\d{8}-[a-z0-9-]+$', '必須是 YYYYMMDD-英文短名，例如 20260720-my-post']
      - { name: slug, label: 文章網址名稱, widget: string, hint: 用小寫英文與連字號，例如 my-first-post。之後網址會像 /blog/my-first-post/。 }
      - { name: excerpt, label: 文章摘要, widget: text, hint: 顯示在文章列表與預覽卡片，寫 1–2 句就好。 }
      - name: status
        label: 發布狀態
        hint: 新文章先用 draft 或 awaiting_human_review。只有選 published 並儲存後，才會進正式部落格。
        widget: select
        options:
          - { label: 草稿：還在寫，不公開, value: draft }
          - { label: 等我檢查：可看預覽，不公開, value: awaiting_human_review }
          - { label: 正式公開：會出現在網站, value: published }
        default: draft
      - { name: approval_required, label: 發布保險：需要人工核准, widget: boolean, default: true, hint: 建議保持開啟，避免文章還沒看過就公開。 }
      - { name: featured, label: 設成精選文章, widget: boolean, default: false, required: false, hint: 通常先不要開；首頁或列表要特別主打時再開。 }
      - { name: author, label: 作者, widget: string, default: CalumAi Studio, required: false }
      - { name: category, label: 分類, widget: string, required: false }
      - { name: series, label: 系列, widget: string, required: false }
      - { name: series_order, label: 系列順序, widget: number, required: false }
      - { name: feature_image, label: 主圖, widget: image, required: false }
      - { name: feature_image_alt, label: 主圖說明, widget: string, required: false }
      - name: image_source_type
        label: 主圖來源類型
        hint: 正式發布前要選真實來源；如果還沒準備好，先維持 pending。
        widget: select
        options:
          - { label: 還沒確認圖片來源, value: pending }
          - { label: 專案實際截圖, value: project_screenshot }
          - { label: 自製編輯圖解, value: editorial_diagram }
        default: pending
      - { name: image_source_path, label: 主圖來源紀錄, widget: string, required: false, hint: 寫這張圖從哪裡來，例如截圖路徑、設計檔或生成紀錄。 }
      - { name: seo_title, label: SEO 標題, widget: string, required: false }
      - { name: seo_description, label: SEO 描述, widget: text, required: false }
      - { name: body, label: 文章內文, widget: markdown, hint: 這裡寫正式文章。儲存後按「打開部落格預覽」檢查排版。 }

  - name: episodes
    label: AI-100 內容（備課小幫手）
    label_singular: AI-100 內容
    folder: episodes
    create: true
    format: yaml-frontmatter
    extension: md
    path: '{{slug}}/episode'
    preview_path: '/admin/previews/ai100/{{slug}}/'
    media_folder: ''
    public_folder: ''
    slug: '{{fields.id}}'
    identifier_field: title
    summary: '{{fields.id}}｜{{title}}（{{fields.status}}）'
    sortable_fields: [title, status]
    fields:
      - name: id
        label: 內容編號（建立後不可改）
        hint: 影片課程用 EP001；一般圖文講義或延伸教學用 SP001；Gemini 路線用 GM001。後台可能顯示小寫，但預覽網址會用大寫。
        widget: string
        pattern: ['^([Ee][Pp]|[Ss][Pp]|[Gg][Mm])\d{3}$', '影片課程用 EP001；圖文講義／延伸教學可用 SP001；Gemini 路線用 GM001（大小寫都可以）']
      - name: content_type
        label: 內容類型
        hint: 有 YouTube 影片就選影片課程；沒有影片、只有 Markdown 講義就選圖文講義。
        widget: select
        options:
          - { label: 影片課程（有 YouTube）, value: video_lesson }
          - { label: 圖文講義（沒有影片，只用 Markdown）, value: handout }
        default: video_lesson
      - name: track
        label: AI100 路線分類
        hint: 這是讀者看到的分類。四條路線是平行的，不用把 Gemini 接在 ChatGPT 後面。
        widget: select
        options:
          - { label: 導論, value: intro }
          - { label: ChatGPT, value: chatgpt }
          - { label: Gemini, value: gemini }
          - { label: NotebookLM / Gemini Book, value: notebooklm }
        default: intro
      - { name: title, label: 標題, widget: string, hint: 會顯示在 AI-100 卡片與講義頁。 }
      - { name: summary, label: 內容摘要, widget: text, required: false, hint: 寫 1–2 句，讓讀者知道這篇在教什麼。 }
      - { name: learning_goal, label: 學習目標（僅內部參考）, widget: text, required: false }
      - { name: teaching_result, label: 教學成果（僅內部參考）, widget: text, required: false }
      - name: cover_image
        label: 封面圖（PNG 或 JPEG，會存進這筆內容自己的資料夾）
        hint: 上傳這篇自己的封面圖。沒有封面也能先預覽，但正式發布建議補上。
        widget: image
        required: false
        media_folder: ''
        public_folder: ''
      - name: youtube_url
        label: YouTube 網址（只有影片課程要填）
        hint: 圖文講義可以空白。影片課程請貼 youtube.com/watch?v=... 或 youtu.be/...。
        widget: string
        required: false
        pattern: ['^$|^https://(www\.)?(youtube\.com/watch\?v=|youtu\.be/).+', '必須是 youtube.com/watch?v=... 或 youtu.be/... 網址']
      - name: source_markdown
        label: 上傳 Markdown 講義（.md，可選，會自動帶入講義內文）
        hint: 上傳後會嘗試自動帶入下面的「講義內文」。如果沒有帶入，按右下角「匯入 .md 到講義內文」。
        widget: file
        required: false
        accept: .md,.markdown,text/markdown,text/plain
        media_folder: ''
        public_folder: ''
      - name: status
        label: 發布狀態
        hint: 先維持 draft，儲存後看 AI-100 預覽。確認沒問題再改成 published。
        widget: select
        options:
          - { label: 草稿：可產生預覽，不公開, value: draft }
          - { label: 正式公開：會出現在 AI-100, value: published }
        default: draft
      - { name: content_approved, label: 發布前確認：內容看過了，沒有明顯錯字或排版問題, widget: boolean, default: false }
      - { name: privacy_approved, label: 發布前確認：圖片/畫面沒有私人資料, widget: boolean, default: false }
      - { name: youtube_approved, label: 影片才需要：YouTube 已確認可公開, widget: boolean, default: false, hint: 圖文講義不用管這個；影片課程要確認 YouTube 可公開播放。 }
      - { name: published_at, label: 發布時間（自動保留，勿改）, widget: string, required: false }
      - { name: notes, label: 備註, widget: text, required: false }
      - name: body
        label: 講義內文（發布以這裡為主；上傳 .md 後會自動帶入）
        widget: markdown
        required: false
        hint: 正式發布會以這裡為主。儲存後按「打開 AI-100 預覽」看真正排版。
